version: '3'

services:
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt
      - /sua/pasta/target/lakehouse/target:/usr/share/nginx/html
    networks:
      - proxy_net

networks:
  proxy_net:
    driver: bridge